{% extends "core/base.html" %}
{% block title %}Buscar Sala - CineApp{% endblock %}

{% block content %}
  <div class="container">
    <div class="form-page">
      <div class="form-page__header">
        <a href="{% url 'salas' %}" class="form-page__back">← Volver a Salas</a>
        <h1>Buscar Sala por Nombre y Numero</h1>
        <p class="text-muted">Ingresa el nombre y numero de la sala para buscarla.</p>
      </div>
      <div class="card">
        <form method="get" action="{% url 'buscarSala' %}" class="form">
          {{ form.as_p }}
          <button type="submit" class="btn">Buscar</button>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
