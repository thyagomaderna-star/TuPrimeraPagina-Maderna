
{% extends "core/base.html" %}

{% block title %}Usuario Agredado - CineApp{% endblock %}

{% block content %}
<div class="container">
  <div class="card" style="max-width: 480px; margin-inline: auto; text-align: center;">
    <div class="alert alert--success">
      ¡Se ha agregado correctamente!
    </div>
    <p class="text-muted">Puedes agregar más usuarios o buscar uno existente.</p>
    <div class="flex flex-gap" style="justify-content: center; margin-top: 1.5rem;">
      <a href="{% url 'salaFormulario' %}" class="btn">Agregar otro Usuario</a>
      <a href="{% url 'usuarios' %}" class="btn btn--outline">Ver Usuarios</a>
      <a href="{% url 'buscarUsuario' %}" class="btn btn--ghost">Buscar Usuarios</a>
    </div>
  </div>
</div>
{% endblock %}
