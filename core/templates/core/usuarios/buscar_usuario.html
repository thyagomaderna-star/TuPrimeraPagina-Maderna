{% extends "core/base.html" %}
{% block title %}Buscar Usuario - CineApp{% endblock %}

{% block content %}
  <div class="container">
    <div class="form-page">
      <div class="form-page__header">
        <a href="{% url 'usuarios' %}" class="form-page__back">← Volver a Usuarios</a>
        <h1>Rellene los campos para buscar el usuario</h1>
        <p class="text-muted">Recuerda respetar las mayusculas y los espacios.</p>
      </div>
      <div class="card">
        <form method="get" action="{% url 'buscarUsuario' %}" class="form">
          {{ form.as_p }}
          <button type="submit" class="btn">Buscar</button>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
