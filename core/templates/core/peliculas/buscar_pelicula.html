{% extends "core/base.html" %}
{% block title %}Buscar Película - CineApp{% endblock %}

{% block content %}
  <div class="container">
    <div class="form-page">
      <div class="form-page__header">
        <a href="{% url 'peliculas' %}" class="form-page__back">← Volver a Películas</a>
        <h1>Buscar Película</h1>
        <p class="text-muted">Ingresa los datos para buscarla.</p>
      </div>
      <div class="card">
        <form method="get" action="{% url 'buscarPeliculas' %}" class="form">
          {{ form.as_p }}
          <button type="submit" class="btn">Buscar</button>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
